name: Rust CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test_no_std:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: thumbv7m-none-eabi
    - name: Check no_std (thumbv7m)
      run: cargo check --target thumbv7m-none-eabi --no-default-features
    - name: Check no_std default-formats (native)
      run: cargo check --no-default-features --features default-formats

  test_features:
    runs-on: ubuntu-latest
    needs: ["rustfmt"]
    strategy:
      fail-fast: false
      matrix:
        features: ['std', 'std,default', 'std,rayon', 'std,avif', 'std,bmp', 'std,dds', 'std,exr', 'std,ff', 'std,gif', 'std,hdr', 'std,ico', 'std,jpeg', 'std,png', 'std,pnm', 'std,qoi', 'std,tga', 'std,tiff', 'std,webp']
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: Cache Cargo Dependencies
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
    - name: build
      run: cargo build -v --no-default-features --features "$FEATURES"
      env:
        FEATURES: ${{ matrix.features }}
    - name: test
      run: >
        cargo test -v --no-default-features --features "$FEATURES" &&
        cargo doc -v --no-default-features --features "$FEATURES"
      env:
        FEATURES: ${{ matrix.features }}

  test_toolchains:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: ["1.88.0", nightly, beta]
    steps:
    - uses: actions/checkout@v4

    - uses: dtolnay/rust-toolchain@nightly
      if: ${{ matrix.rust == '1.88.0' }}
    - name: Generate Cargo.lock with minimal-version dependencies
      if: ${{ matrix.rust == '1.88.0' }}
      run: |
        cargo -Zminimal-versions generate-lockfile
        cargo update --offline num-bigint --precise 0.4.2

    - uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ matrix.rust }}
    - name: Cache Cargo Dependencies
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
    - name: build
      run: cargo build -v --features std
    - name: test
      if: ${{ matrix.rust != '1.88.0' }}
      run: cargo test -v --features std && cargo doc -v --features std

  test_other_archs:
    runs-on: ubuntu-latest
    needs: ["rustfmt", "cargo-deny"]
    strategy:
      fail-fast: false
      matrix:
        arch: [powerpc64-unknown-linux-gnu, i686-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
      - name: Install or use cached cross-rs/cross
        uses: baptiste0928/cargo-install@v2
        with:
          crate: cross
      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: ${{ matrix.arch }}
      - name: Start Docker (required for cross-rs)
        run: sudo systemctl start docker
      - name: Cross-Run Tests using QEMU
        run: cross test --target ${{ matrix.arch }} --features std

  test_avif_decoding:
    runs-on: ubuntu-latest
    needs: ["rustfmt"]
    steps:
    - name: install-dependencies
      run: sudo apt update && sudo apt install ninja-build meson nasm
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - name: build
      run: cargo build -v --no-default-features --features="std,avif,avif-native"
      env:
        SYSTEM_DEPS_DAV1D_BUILD_INTERNAL: always

  clippy:
    runs-on: ubuntu-latest
    steps:
    - name: install-dependencies
      run: sudo apt update && sudo apt install ninja-build meson nasm
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@nightly
      with:
        components: clippy
    - name: Cache Clippy
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        shared-key: cargo-check
    - run: cargo clippy --all-features --all-targets -- -D warnings
      env:
        SYSTEM_DEPS_DAV1D_BUILD_INTERNAL: always
        CLIPPY_CONF_DIR: ${{ github.workspace }}
    - run: cargo clippy -- -D warnings
      env:
        CLIPPY_CONF_DIR: ${{ github.workspace }}
    - run: cargo clippy --no-default-features -- -D warnings
      env:
        CLIPPY_CONF_DIR: ${{ github.workspace }}

  build_fuzz_afl:
    name: "Fuzz targets (afl)"
    runs-on: ubuntu-latest
    needs: ["clippy"]
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@nightly
    - name: install-deps
      run: sudo apt-get -y install clang llvm
    - name: Cache Cargo Registry
      uses: Swatinem/rust-cache@v2
      with:
        cache-targets: false
        cache-all-crates: true
        cache-on-failure: true
    - name: Install cargo-afl
      run: cargo install --locked -f cargo-afl
    - name: build
      run: |
        cd fuzz-afl
        cargo check --bin reproduce_webp
        cargo check --bin reproduce_pnm
        cargo afl check --bin fuzz_webp
        cargo afl check --bin fuzz_pnm
      env:
        RUSTFLAGS: ""

  build_fuzz_cargo-fuzz:
    name: "Fuzz targets (cargo-fuzz)"
    runs-on: ubuntu-latest
    needs: ["clippy"]
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@nightly
    - name: Install cargo-fuzz
      uses: baptiste0928/cargo-install@v3
      with:
        crate: cargo-fuzz
    - name: check
      run: cargo fuzz check
      env:
        CARGO_INCREMENTAL: 0

  public_private_dependencies:
    runs-on: ubuntu-latest
    needs: ["clippy"]
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@nightly
    - name: build
      run: |
        echo '#![deny(exported_private_dependencies)]' | cat - src/lib.rs > src/lib.rs.0
        mv src/lib.rs.0 src/lib.rs
        echo 'cargo-features = ["public-dependency"]' | cat - Cargo.toml > Cargo.toml.0
        mv Cargo.toml.0 Cargo.toml
        # mark rayon crate as public
        sed -i 's/rayon = { ver/rayon = { public = true, ver/' Cargo.toml
        # mark num-traits crate as public
        sed -i 's/num-traits = { ver/num-traits = { public = true, ver/' Cargo.toml
        # cargo +nightly check
        cargo check

  build_benchmarks:
    runs-on: ubuntu-latest
    needs: ["clippy"]
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@nightly
    - name: build
      run: cargo build -v --benches --features=benchmarks

  rustfmt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    - name: Run rustfmt check
      run: cargo fmt -- --check

  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  cargo-semver-checks:
    runs-on: ubuntu-latest
    needs: ["clippy"]
    steps:
      - uses: actions/checkout@v4
      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: cargo-check
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          feature-group: default-features
          release-type: minor
