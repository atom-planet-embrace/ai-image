# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "aarch64-apple-darwin" },
    { triple = "aarch64-linux-android" },
    { triple = "x86_64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-musl" },
]


[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0 WITH LLVM-exception",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "MIT",
    "Unicode-3.0",
    "Zlib",          # foldhash (via hashbrown)
]

[[licenses.exceptions]]
# Not copyleft so only applies with feature dependencies
allow = ["MPL-2.0"]
name = "mp4parse"

[advisories]
yanked = "deny"
ignore = [
    # `paste` (through rav1e) is unmaintained, migration <https://github.com/xiph/rav1e/issues/3418>
    # However the crate still works with forseeable problems only in future editions.
    "RUSTSEC-2024-0436",
]


[bans]
multiple-versions = "deny"
wildcards = "allow" # at least until https://github.com/EmbarkStudios/cargo-deny/issues/241 is fixed
deny = []
skip = [
    { name = "foldhash" },    # 0.1.5 (hashbrown 0.15 via ai-image-webp) and 0.2.0 (hashbrown 0.16 via ai-exr)
    { name = "hashbrown" },   # 0.15.5 (ai-image-webp) and 0.16.1 (ai-exr)
    { name = "miniz_oxide" }, # 0.8.9 (ai-png) and 0.9.1 (ai-exr, ai-flate2)
    { name = "winnow" },      # 0.7.15 and 1.0.0 (both via toml -> system-deps -> dav1d-sys)
]
